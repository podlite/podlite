name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install and Test
        run: |
          yarn install
          yarn build
          yarn test
